<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التعاونية — مساعد التأمين</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
display:flex;
height:100vh;
background:#f0f4f8;
color:#1a202c;
}

/* Sidebar */

#sidebar{
width:240px;
background:#1a3c6e;
color:white;
display:flex;
flex-direction:column;
padding:20px 16px;
}

#sidebar h2{
font-size:1rem;
margin-bottom:6px;
}

#sidebar p{
font-size:0.75rem;
opacity:.8;
margin-bottom:24px;
}

.sidebar-btn{
background:#2a4e8e;
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
font-size:.85rem;
margin-bottom:8px;
}

.sidebar-btn:hover{
background:#345da8;
}

/* Main chat */

#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:white;
border-bottom:1px solid #e2e8f0;
padding:16px 24px;
font-weight:600;
font-size:0.95rem;
}

/* Chat */

#chat{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:16px;
}

/* Messages */

.message{
max-width:720px;
width:100%;
display:flex;
gap:12px;
}

.user{
flex-direction:row-reverse;
}

.avatar{
width:32px;
height:32px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.bot .avatar{
background:#1a3c6e;
color:white;
}

.user .avatar{
background:#cbd5e0;
}

.bubble{
padding:12px 16px;
border-radius:12px;
font-size:.92rem;
line-height:1.6;
white-space:pre-wrap;
}

.bot .bubble{
background:white;
border:1px solid #e2e8f0;
}

.user .bubble{
background:#1a3c6e;
color:white;
}

/* Followups */

.followups{
margin-top:8px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.followup-chip{
background:#ebf4ff;
border:1px solid #bee3f8;
color:#2b6cb0;
padding:5px 10px;
border-radius:20px;
font-size:.78rem;
cursor:pointer;
}

.followup-chip:hover{
background:#bee3f8;
}

/* Typing */

.typing{
display:flex;
gap:5px;
padding:12px;
}

.dot{
width:8px;
height:8px;
background:#a0aec0;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-6px)}
}

/* Input */

#input-area{
border-top:1px solid #e2e8f0;
padding:16px;
background:white;
display:flex;
gap:10px;
}

#query{
flex:1;
border:1px solid #cbd5e0;
border-radius:10px;
padding:10px 12px;
font-size:.9rem;
resize:none;
max-height:120px;
outline:none;
}

#query:focus{
border-color:#1a3c6e;
}

#send-btn{
background:#1a3c6e;
color:white;
border:none;
border-radius:10px;
padding:10px 18px;
cursor:pointer;
font-size:.85rem;
}

#send-btn:hover{
background:#2a4e8e;
}

</style>
</head>

<body>

<div id="sidebar">
<h2>التعاونية</h2>
<p>مساعد التأمين الذكي</p>

<button class="sidebar-btn" onclick="clearHistory()">محادثة جديدة</button>

<div id="stats" style="margin-top:auto;font-size:.75rem;opacity:.8">
جاري التحميل...
</div>
</div>

<div id="main">

<header>
مساعد التعاونية للتأمين
</header>

<div id="chat"></div>

<div id="input-area">
<textarea id="query" rows="1" placeholder="اكتب سؤالك هنا..."></textarea>
<button id="send-btn" onclick="sendMessage()">إرسال</button>
</div>

</div>

<script>

const chat=document.getElementById("chat")
const queryEl=document.getElementById("query")
const stats=document.getElementById("stats")

fetch("/stats")
.then(r=>r.json())
.then(s=>{
stats.textContent=`${s.total_chunks} مقطع`
})

appendBot("مرحباً! كيف يمكنني مساعدتك بخصوص منتجات التأمين؟")

queryEl.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
})

function sendMessage(){

const q=queryEl.value.trim()
if(!q) return

appendUser(q)
queryEl.value=""

const typing=appendTyping()

fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query:q})
})
.then(r=>r.json())
.then(data=>{
removeTyping(typing)
appendBot(data.answer,data.followup_questions||[])
})
.catch(()=>{
removeTyping(typing)
appendBot("حدث خطأ في الاتصال بالخادم.")
})

}

function appendUser(text){

const el=document.createElement("div")
el.className="message user"

el.innerHTML=`
<div class="avatar">أ</div>
<div class="bubble">${escapeHtml(text)}</div>
`

chat.appendChild(el)
scrollBottom()

}

function appendBot(text,followups=[]){

const el=document.createElement("div")
el.className="message bot"

let html=`
<div class="avatar">🤖</div>
<div>
<div class="bubble">${escapeHtml(text)}</div>
`

if(followups.length){

html+=`<div class="followups">`

followups.forEach(f=>{
html+=`<button class="followup-chip" onclick="useFollowup(this)">${escapeHtml(f)}</button>`
})

html+=`</div>`
}

html+=`</div>`

el.innerHTML=html
chat.appendChild(el)
scrollBottom()

}

function appendTyping(){

const id="typing-"+Date.now()

const el=document.createElement("div")
el.className="message bot"
el.id=id

el.innerHTML=`
<div class="avatar">🤖</div>
<div class="bubble typing">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
`

chat.appendChild(el)
scrollBottom()

return id
}

function removeTyping(id){
const el=document.getElementById(id)
if(el) el.remove()
}

function useFollowup(btn){
queryEl.value=btn.textContent
sendMessage()
}

function clearHistory(){

fetch("/clear",{method:"POST"})
.then(()=>{
chat.innerHTML=""
appendBot("تم مسح المحادثة. كيف يمكنني مساعدتك؟")
})

}

function scrollBottom(){
chat.scrollTop=chat.scrollHeight
}

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}

</script>

</body>
</html>
