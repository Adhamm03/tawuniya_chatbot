<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tawuniya — Persona Admin</title>
<style>

/* ── Reset & base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand:        #1a3c6e;
  --brand-light:  #2a4e8e;
  --brand-faint:  #ebf4ff;
  --accent:       #2563eb;
  --success:      #16a34a;
  --danger:       #dc2626;
  --warn:         #d97706;
  --surface:      #ffffff;
  --bg:           #f1f5f9;
  --border:       #e2e8f0;
  --text:         #1e293b;
  --muted:        #64748b;
  --radius:       10px;
  --shadow:       0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top nav ──────────────────────────────────────────────────────────── */
nav {
  background: var(--brand);
  color: #fff;
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  position: sticky;
  top: 0;
  z-index: 100;
}

nav .logo {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: .02em;
}

nav .badge {
  background: rgba(255,255,255,.15);
  font-size: .7rem;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .04em;
}

nav a {
  margin-right: auto; /* push nav link to right */
  margin-left: auto;
}

nav .nav-link {
  color: rgba(255,255,255,.75);
  font-size: .82rem;
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background .15s;
}
nav .nav-link:hover { background: rgba(255,255,255,.12); color: #fff; }

/* ── Layout ───────────────────────────────────────────────────────────── */
.layout {
  display: flex;
  flex: 1;
  gap: 0;
  max-width: 1280px;
  width: 100%;
  margin: 0 auto;
  padding: 28px 24px;
  gap: 24px;
  align-items: flex-start;
}

/* ── Left column — persona list ───────────────────────────────────────── */
.col-list {
  width: 320px;
  flex-shrink: 0;
}

.col-list h2 {
  font-size: .78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 12px;
}

.add-btn {
  width: 100%;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  transition: background .15s;
}
.add-btn:hover { background: var(--brand-light); }

#persona-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.persona-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  position: relative;
}

.persona-card:hover {
  border-color: var(--brand);
  box-shadow: var(--shadow);
}

.persona-card.active {
  border-color: var(--brand);
  background: var(--brand-faint);
}

.persona-card .card-name {
  font-size: .9rem;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 3px;
}

.persona-card .card-trigger {
  font-size: .75rem;
  color: var(--muted);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.persona-card .card-chips {
  margin-top: 8px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.chip {
  font-size: .68rem;
  padding: 2px 7px;
  border-radius: 20px;
  background: #e0e7ff;
  color: #3730a3;
}

.chip.examples { background: #dcfce7; color: #166534; }

.card-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
}

.persona-card:hover .card-actions { opacity: 1; }

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 26px;
  height: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  transition: background .12s;
}

.icon-btn.edit:hover { background: #dbeafe; border-color: #93c5fd; }
.icon-btn.del:hover  { background: #fee2e2; border-color: #fca5a5; }

/* ── Right column — editor ────────────────────────────────────────────── */
.col-editor {
  flex: 1;
  min-width: 0;
}

.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.editor-header {
  background: var(--brand);
  color: #fff;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.editor-header h3 { font-size: .95rem; font-weight: 600; }

.editor-body { padding: 22px; }

/* form fields */
.field { margin-bottom: 18px; }

label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
}

label .hint {
  text-transform: none;
  font-weight: 400;
  letter-spacing: 0;
  color: #94a3b8;
  font-size: .73rem;
}

input[type=text],
textarea,
select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: .88rem;
  color: var(--text);
  background: #fafbfc;
  transition: border-color .15s;
  font-family: inherit;
}

input[type=text]:focus,
textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}

textarea { resize: vertical; line-height: 1.6; }

/* ── Examples section ─────────────────────────────────────────────────── */
.examples-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.examples-header span {
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}

.add-example-btn {
  background: var(--brand-faint);
  color: var(--brand);
  border: 1px solid #bfdbfe;
  border-radius: 7px;
  padding: 5px 12px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
}
.add-example-btn:hover { background: #dbeafe; }

#examples-list { display: flex; flex-direction: column; gap: 12px; }

.example-row {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.example-row-head {
  background: #f8fafc;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .75rem;
  font-weight: 600;
  color: var(--muted);
}

.example-row-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; }

.example-row textarea {
  font-size: .82rem;
  background: #fff;
  border-color: #e2e8f0;
}

.remove-ex {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: .8rem;
  padding: 2px 6px;
  border-radius: 4px;
}
.remove-ex:hover { background: #fee2e2; }

/* ── System prompt preview ────────────────────────────────────────────── */
.preview-box {
  background: #0f172a;
  color: #94a3b8;
  border-radius: 8px;
  padding: 14px 16px;
  font-size: .78rem;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 260px;
  overflow-y: auto;
}

.preview-box .kw  { color: #7dd3fc; }
.preview-box .val { color: #86efac; }

/* ── Footer buttons ───────────────────────────────────────────────────── */
.editor-footer {
  border-top: 1px solid var(--border);
  padding: 14px 22px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn {
  padding: 9px 20px;
  border-radius: 8px;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: background .15s, transform .1s;
}
.btn:active { transform: scale(.97); }

.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-light); }

.btn-ghost {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--muted);
}
.btn-ghost:hover { border-color: #94a3b8; color: var(--text); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }

/* ── Toast ────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 22px;
  border-radius: 30px;
  font-size: .85rem;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999;
  pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: #166534; }
#toast.error   { background: #991b1b; }

/* ── Empty state ──────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: .88rem; }

/* ── Delete confirm overlay ───────────────────────────────────────────── */
#confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

#confirm-overlay.open { display: flex; }

.confirm-box {
  background: #fff;
  border-radius: 12px;
  padding: 28px 32px;
  width: 360px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,.25);
}

.confirm-box h4 { font-size: 1rem; margin-bottom: 8px; }
.confirm-box p  { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
.confirm-box .btns { display: flex; gap: 10px; justify-content: center; }

</style>
</head>

<body>

<!-- ── Nav ─────────────────────────────────────────────────────────────── -->
<nav>
  <span class="logo">التعاونية</span>
  <span class="badge">ADMIN</span>
  <a href="/" class="nav-link">← Back to Chat</a>
</nav>

<!-- ── Main layout ────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Left: persona list -->
  <div class="col-list">
    <h2>Personas <span id="persona-count" style="font-weight:400;color:#94a3b8"></span></h2>
    <button class="add-btn" onclick="openNew()">＋ New Persona</button>
    <div id="persona-list">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Loading personas…</p>
      </div>
    </div>
  </div>

  <!-- Right: editor -->
  <div class="col-editor">
    <div class="editor-card" id="editor-card">

      <!-- Default empty state -->
      <div class="empty-state" style="padding:80px 20px" id="editor-empty">
        <div class="icon">🎭</div>
        <p style="margin-bottom:8px;font-weight:600;color:#475569">No persona selected</p>
        <p>Click a persona to edit it, or create a new one.</p>
      </div>

      <!-- Editor form (hidden until a persona is selected / created) -->
      <div id="editor-form" style="display:none">

        <div class="editor-header">
          <span style="font-size:1.2rem">🎭</span>
          <h3 id="editor-title">New Persona</h3>
        </div>

        <div class="editor-body">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

            <div class="field">
              <label>Name <span class="hint">— shown in admin UI</span></label>
              <input type="text" id="f-name" placeholder="e.g. Complaint Handling">
            </div>

            <div class="field">
              <label>Label <span class="hint">— shown in server logs</span></label>
              <input type="text" id="f-label" placeholder="e.g. Complaint mode — frustrated user">
            </div>

          </div>

          <div class="field">
            <label>Trigger Description
              <span class="hint">— one sentence telling the classifier WHEN to pick this persona</span>
            </label>
            <input type="text" id="f-trigger"
              placeholder="e.g. User is frustrated, confused, or expressing dissatisfaction">
          </div>

          <div class="field">
            <label>System Instruction
              <span class="hint">— injected into the system prompt when this persona is selected</span>
            </label>
            <textarea id="f-instruction" rows="5"
              placeholder="You are in COMPLAINT MODE. Lead with empathy..."></textarea>
          </div>

          <!-- Examples -->
          <div class="field">
            <div class="examples-header">
              <span>Few-shot Examples <span style="color:#94a3b8;font-weight:400;text-transform:none">(optional but recommended)</span></span>
              <button class="add-example-btn" onclick="addExample()">＋ Add Example</button>
            </div>
            <div id="examples-list"></div>
          </div>

          <!-- Prompt preview -->
          <div class="field">
            <label>System Prompt Preview <span class="hint">— live preview of what the LLM sees</span></label>
            <div class="preview-box" id="preview-box">Fill in the fields above to see a preview.</div>
          </div>

        </div><!-- /editor-body -->

        <div class="editor-footer">
          <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-primary" onclick="savePersona()">💾 Save Persona</button>
        </div>

      </div><!-- /editor-form -->

    </div><!-- /editor-card -->
  </div><!-- /col-editor -->

</div><!-- /layout -->

<!-- ── Delete confirm ──────────────────────────────────────────────────── -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <h4>Delete Persona?</h4>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────────────── -->
<div id="toast"></div>


<script>

/* ── State ────────────────────────────────────────────────────────────── */
let personas      = [];         // all personas from server
let editingId     = null;       // null = new, string = editing existing
let pendingDelete = null;       // id to delete after confirm

/* ── Boot ─────────────────────────────────────────────────────────────── */
loadPersonas();

/* ── API helpers ──────────────────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

/* ── Load & render list ───────────────────────────────────────────────── */
async function loadPersonas() {
  try {
    personas = await api('GET', '/personas');
    renderList();
  } catch(e) {
    showToast('Failed to load personas: ' + e.message, 'error');
  }
}

function renderList() {
  const container = document.getElementById('persona-list');
  document.getElementById('persona-count').textContent = `(${personas.length})`;

  if (!personas.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">🎭</div>
      <p>No personas yet. Create one!</p>
    </div>`;
    return;
  }

  container.innerHTML = personas.map(p => `
    <div class="persona-card ${editingId === p.id ? 'active' : ''}"
         id="card-${p.id}"
         onclick="openEdit('${p.id}')">
      <div class="card-actions">
        <button class="icon-btn edit" title="Edit" onclick="event.stopPropagation();openEdit('${p.id}')">✏️</button>
        <button class="icon-btn del"  title="Delete" onclick="event.stopPropagation();askDelete('${p.id}','${escHtml(p.name)}')">🗑️</button>
      </div>
      <div class="card-name">${escHtml(p.name)}</div>
      <div class="card-trigger">${escHtml(p.trigger_description)}</div>
      <div class="card-chips">
        ${p.examples && p.examples.length
          ? `<span class="chip examples">${p.examples.length} example${p.examples.length > 1 ? 's' : ''}</span>`
          : ''}
        <span class="chip">${escHtml(p.id.slice(0,8))}…</span>
      </div>
    </div>
  `).join('');
}

/* ── Open new / edit ──────────────────────────────────────────────────── */
function openNew() {
  editingId = null;
  document.getElementById('editor-title').textContent = 'New Persona';
  clearForm();
  showForm();
  renderList();   // update active highlight
}

function openEdit(id) {
  const p = personas.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('editor-title').textContent = 'Edit Persona';
  fillForm(p);
  showForm();
  renderList();
}

function showForm() {
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-form').style.display  = '';
  updatePreview();
}

function cancelEdit() {
  editingId = null;
  document.getElementById('editor-empty').style.display = '';
  document.getElementById('editor-form').style.display  = 'none';
  renderList();
}

/* ── Form helpers ─────────────────────────────────────────────────────── */
function clearForm() {
  ['f-name','f-label','f-trigger','f-instruction'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('examples-list').innerHTML = '';
  updatePreview();
}

function fillForm(p) {
  document.getElementById('f-name').value        = p.name || '';
  document.getElementById('f-label').value       = p.label || '';
  document.getElementById('f-trigger').value     = p.trigger_description || '';
  document.getElementById('f-instruction').value = p.instruction || '';

  const list = document.getElementById('examples-list');
  list.innerHTML = '';
  (p.examples || []).forEach(ex => addExample(ex.user, ex.assistant));
  updatePreview();
}

function readForm() {
  const examples = [];
  document.querySelectorAll('.example-row').forEach(row => {
    const user      = row.querySelector('.ex-user').value.trim();
    const assistant = row.querySelector('.ex-assistant').value.trim();
    if (user || assistant) examples.push({ user, assistant });
  });
  return {
    name:               document.getElementById('f-name').value.trim(),
    label:              document.getElementById('f-label').value.trim(),
    trigger_description: document.getElementById('f-trigger').value.trim(),
    instruction:        document.getElementById('f-instruction').value.trim(),
    examples,
  };
}

/* ── Examples ─────────────────────────────────────────────────────────── */
let exCounter = 0;

function addExample(userText = '', assistantText = '') {
  const id  = ++exCounter;
  const row = document.createElement('div');
  row.className = 'example-row';
  row.id = `ex-${id}`;
  row.innerHTML = `
    <div class="example-row-head">
      Example ${id}
      <button class="remove-ex" onclick="removeExample('ex-${id}')">✕ Remove</button>
    </div>
    <div class="example-row-body">
      <textarea class="ex-user" rows="2" placeholder="User message…" oninput="updatePreview()">${escHtml(userText)}</textarea>
      <textarea class="ex-assistant" rows="3" placeholder="Assistant reply…" oninput="updatePreview()">${escHtml(assistantText)}</textarea>
    </div>
  `;
  document.getElementById('examples-list').appendChild(row);
  updatePreview();
}

function removeExample(rowId) {
  document.getElementById(rowId)?.remove();
  updatePreview();
}

/* ── Live preview ─────────────────────────────────────────────────────── */
function updatePreview() {
  const data  = readForm();
  const label = data.label || '(label)';
  const instr = data.instruction || '(instruction)';

  let text = `## Reply Mode: ${label}\n${instr}\n`;

  data.examples.forEach((ex, i) => {
    text += `\n### Example ${i + 1}\nUser: ${ex.user}\nAssistant: ${ex.assistant}`;
  });

  document.getElementById('preview-box').textContent = text || 'Fill in the fields above to see a preview.';
}

// Attach live update listeners
['f-name','f-label','f-trigger','f-instruction'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', updatePreview);
});

/* ── Save ─────────────────────────────────────────────────────────────── */
async function savePersona() {
  const data = readForm();
  if (!data.name)        return showToast('Name is required.', 'error');
  if (!data.instruction) return showToast('System instruction is required.', 'error');
  if (!data.trigger_description) return showToast('Trigger description is required.', 'error');

  try {
    if (editingId) {
      const updated = await api('PUT', `/personas/${editingId}`, data);
      const idx = personas.findIndex(p => p.id === editingId);
      if (idx !== -1) personas[idx] = updated;
      showToast('Persona updated ✓', 'success');
    } else {
      const created = await api('POST', '/personas', data);
      personas.push(created);
      editingId = created.id;
      document.getElementById('editor-title').textContent = 'Edit Persona';
      showToast('Persona created ✓', 'success');
    }
    renderList();
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  }
}

/* ── Delete ───────────────────────────────────────────────────────────── */
function askDelete(id, name) {
  pendingDelete = id;
  document.getElementById('confirm-msg').textContent =
    `"${name}" will be permanently deleted. This cannot be undone.`;
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm() {
  pendingDelete = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}

async function confirmDelete() {
  if (!pendingDelete) return closeConfirm();
  try {
    await api('DELETE', `/personas/${pendingDelete}`);
    personas = personas.filter(p => p.id !== pendingDelete);
    if (editingId === pendingDelete) cancelEdit();
    renderList();
    showToast('Persona deleted.', 'success');
  } catch(e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
  closeConfirm();
}

// Close overlay on backdrop click
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

/* ── Toast ────────────────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

/* ── Util ─────────────────────────────────────────────────────────────── */
function escHtml(s = '') {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

</script>
